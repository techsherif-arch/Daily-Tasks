<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSS Example</title>

<style>
body{
    background:#000;
    font-family:Poppins, sans-serif;
}

.box{
    color:gold;
    border:2px solid gold;
    padding:20px;
    margin:20px;
    background:#111;
}

.text{
    font-size:20px;
}

.bold{
    font-weight:bold;
}

.italic{
    font-style:italic;
}

.underline{
    text-decoration:underline;
}
</style>

</head>
<body>

<div class="box text">
    <p class="bold">Bold Text</p>
    <p class="italic">Italic Text</p>
    <p class="underline">Underline Text</p>
</div>

</body>
</html>
