<!DOCTYPE html>
<html>
<head>
    <title>Box Model Example</title>

    <style>
        .box {
            margin: 40px;              /* Space outside the box */
            border: 3px solid black;  /* Visible border */
            padding: 20px;            /* Space inside the border */
            background-color: lightgray;
            width: 250px;
        }
    </style>

</head>
<body>

    <div class="box">
        This is the content inside the box.
    </div>

</body>
</html>
