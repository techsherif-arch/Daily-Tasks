<!DOCTYPE html>
<html>
<head>
    <title>Royal Contact Form</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<!-- Dark Navy Background -->
<body class="bg-dark text-warning p-4">

<div class="container">

    <h2 class="text-center mb-4">Contact Form</h2>

    <!-- Form -->
    <form onsubmit="return showMessage()">

        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Message</label>
            <textarea class="form-control" rows="3" required></textarea>
        </div>

        <!-- Grey Button with Black Text -->
        <button type="submit" class="btn btn-secondary text-dark">Submit</button>

    </form>

</div>

<!-- Popup -->
<script>
function showMessage() {
    alert("Form submitted successfully!");
    return false;
}
</script>

</body>
</html>
