<!DOCTYPE html>
<html>
<head>
<style>
.container {
    display: flex;
    flex-direction: row;
    justify-content: center;
    align-items: center;
    gap: 20px;
    height: 300px;
    border: 2px solid black;
}

.box {
    width: 100px;
    height: 100px;
    background-color: red;
    color: rgb(9, 9, 9);
}
</style>
</head>
<body>

<div class="container">
    <div class="box">A</div>
    <div class="box">B</div>
    <div class="box">C</div>
</div>

</body>
</html>
