<!DOCTYPE html>
<html>
<head>
<style>
.container {
    display: flex;
    flex-direction: row;
    gap: 15px;
    border: 2px solid black;
    padding: 10px;
}

.box {
    width: 80px;
    height: 80px;
    background-color: blue;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
}
</style>
</head>
<body>

<div class="container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
</div>

</body>
</html>
