<!DOCTYPE html>
<html>
<head>
    <title>CSS Selectors Example</title>
    <style>
        p {
            color: #555;
            line-height: 1.6;
        }

        .intro {
            font-style: italic;
        }

        .highlight {
            background-color: #f0f8ff;
            padding: 8px;
        }

        #header {
            color: #2c3e50;
            font-size: 32px;
        }

        .box {
            border: 1px solid #ccc;
            padding: 16px;
        }
    </style>
</head>
<body>

    <h1 id="header">Welcome</h1>

    <p class="intro">This is introduction</p>

    <p class="highlight">Important text</p>

    <div class="box">
        Content inside box
    </div>

</body>
</html>
