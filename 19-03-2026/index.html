<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Simple Website</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Header -->
    <h1 id="header">Welcome to My Website</h1>

    <!-- Intro Section -->
    <p class="intro">
        This is a simple website created using HTML and CSS selectors.
    </p>

    <!-- Normal Paragraph -->
    <p>
        This paragraph shows the use of element selector styling.
    </p>

    <!-- Highlight Section -->
    <p class="highlight">
        This paragraph is highlighted using class selector.
    </p>

    <!-- Box Section -->
    <div class="box">
        <h3>About This Page</h3>
        <p>
            This box demonstrates border and padding using CSS.
        </p>
    </div>

</body>
</html>
