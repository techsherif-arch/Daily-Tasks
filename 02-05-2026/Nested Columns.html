<!DOCTYPE html>
<html>
<head>
    <title>Nested Columns</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="row">
        <div class="col-lg-6 p-3" style="background-color: #fff7ed;">
            <h5>Parent Column</h5>
            <div class="row mt-3">
                <div class="col-6 p-2" style="background-color: #fde2e4;">
                    Sub Column 1
                </div>
                <div class="col-6 p-2" style="background-color: #e9d5ff;">
                    Sub Column 2
                </div>
            </div>
        </div>
        <div class="col-lg-6 p-3 text-dark" style="background-color: #fcd34d;">
            Another Column
        </div>
    </div>
</div>
</body>
</html>
